<title>2026 이건창호 대리점 간담회 찾아오는 길</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f0f0f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 12px;
    font-family: 'Malgun Gothic', sans-serif;
  }
  .card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    overflow: hidden;
    width: 100%;
    max-width: 700px;
  }
  .map-wrap img { width: 100%; height: auto; display: block; }
  .btn-area {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 14px;
    background: #f8f8f8;
    border-top: 1px solid #e0e0e0;
  }
  .btn-kakao { grid-column: 1 / -1; }
  .btn {
    padding: 16px 8px;
    border: none;
    border-radius: 10px;
    font-size: 17px;
    font-weight: bold;
    cursor: pointer;
    color: white;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { opacity: 0.8; transform: scale(0.98); }
  .btn-naver { background: #03C75A; }
  .btn-tmap  { background: #FF6B35; }
  .btn-kakao-style { background: #FEE500; color: #333; }
  .notice { font-size: 12px; color: #aaa; text-align: center; padding: 8px 16px 14px; line-height: 1.6; }
</style>

<script>
  var LAT  = 37.5597;
  var LNG  = 126.8128;
  var NAME = encodeURIComponent("메이필드호텔서울");

  function isAndroid() {
    return /android/i.test(navigator.userAgent);
  }
  function isIOS() {
    return /iphone|ipad|ipod/i.test(navigator.userAgent);
  }

  function openNaver() {
    var appUrl = "nmap://route?dlat=" + LAT + "&dlng=" + LNG + "&dname=" + NAME + "&appname=eagon.gangdam";
    var webUrl = "https://map.naver.com/p/search/" + NAME;
    tryApp(appUrl, webUrl);
  }

  function openTmap() {
    var webUrl = "https://www.tmap.co.kr/tmap2/mobile/tmap.do?scheme=tmap&host=route&goalname=" + NAME + "&goalx=" + LNG + "&goaly=" + LAT;

    if (isAndroid()) {
      // 안드로이드: intent:// 방식
      var intentUrl = "intent://route?goalname=" + NAME + "&goalx=" + LNG + "&goaly=" + LAT
        + "#Intent;scheme=tmap;package=com.skt.tmap.ku;end";
      window.location.href = intentUrl;
      // 앱 미설치 시 스토어로 이동 (intent 자체에 fallback 포함됨)
    } else if (isIOS()) {
      // iOS: tmap:// 딥링크
      var appUrl = "tmap://route?goalname=" + NAME + "&goalx=" + LNG + "&goaly=" + LAT;
      tryApp(appUrl, webUrl);
    } else {
      // PC: 웹으로 바로
      window.open(webUrl, "_blank");
    }
  }

  function openKakao() {
    var appUrl = "kakaomap://route?ep=" + LAT + "," + LNG + "&by=CAR";
    var webUrl = "https://map.kakao.com/link/to/" + NAME + "," + LAT + "," + LNG;
    tryApp(appUrl, webUrl);
  }

  function tryApp(appUrl, webUrl) {
    var iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.src = appUrl;
    document.body.appendChild(iframe);
    setTimeout(function() {
      document.body.removeChild(iframe);
      window.open(webUrl, "_blank");
    }, 1200);
  }
</script>
